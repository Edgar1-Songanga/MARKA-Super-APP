<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MARKA | Unified Super App</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #05070A; --glass: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.08); }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Plus Jakarta Sans'; background: var(--bg); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* --- ROLE-BASED UI --- */
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); }
        .role-badge { font-size: 10px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--gold); color: var(--gold); text-transform: uppercase; }
        
        #stage { flex: 1; overflow-y: auto; padding: 20px 20px 100px; }
        .view { display: none; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 15px; }
        .btn { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-outline { background: none; border: 1px solid var(--border); color: white; margin-top: 8px; }
        
        input, select { width: 100%; background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; margin-top: 8px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:800; font-size:1.2rem;">MARKA</div>
    <div id="user-role-display" class="role-badge">BUYER</div>
</header>

<main id="stage">
    <!-- 1. BUYER VIEW (Main Services) -->
    <section id="buyer-home" class="view active">
        <div class="card" style="background: linear-gradient(135deg, var(--gold), #8A6D3B); color:black;">
            <small>WALLET BALANCE</small>
            <h1 id="v-balance" style="margin:5px 0;">$0.00</h1>
        </div>
        <h3>Our Services</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <div class="card" onclick="App.navigate('taxi-order')">🚖 Taxi</div>
            <div class="card" onclick="App.navigate('delivery-order')">📦 Delivery</div>
            <div class="card" onclick="App.navigate('market')">🛍️ Shop</div>
            <div class="card" onclick="App.switchRole('seller')">⚙️ Seller Mode</div>
        </div>
    </section>

    <!-- 2. TAXI MODULE (Order) -->
    <section id="taxi-order" class="view">
        <h2>Request a Ride</h2>
        <div class="card">
            <label>Destination</label>
            <input type="text" placeholder="Where to?">
            <p style="font-size:12px; margin-top:10px;">Est. Fare: <strong style="color:var(--gold)">$15.00</strong></p>
            <button class="btn btn-gold" onclick="App.orderTaxi(15)">Pay & Request Ride</button>
            <button class="btn btn-outline" onclick="App.navigate('buyer-home')">Cancel</button>
        </div>
    </section>

    <!-- 3. SELLER/DRIVER DASHBOARD -->
    <section id="seller-dash" class="view">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Vendor Panel</h2>
            <button class="role-badge" style="background:none;" onclick="App.switchRole('buyer')">Exit</button>
        </div>
        
        <!-- Registration for Drivers/Sellers -->
        <div class="card">
            <h3>Register Service</h3>
            <select id="reg-type">
                <option value="taxi">Taxi Driver</option>
                <option value="delivery">Courier / Delivery</option>
                <option value="shop">Product Seller</option>
            </select>
            <input type="text" id="reg-info" placeholder="Vehicle Model / Shop Name">
            <button class="btn btn-gold" style="margin-top:15px;" onclick="App.registerService()">Register Now</button>
        </div>

        <div id="vendor-active-jobs">
            <h3>Active Bookings</h3>
            <p style="opacity:0.5;">No active orders yet.</p>
        </div>
    </section>

    <!-- 4. ADMIN PANEL -->
    <section id="admin-panel" class="view">
        <h2>Global Oversight</h2>
        <div class="card">
            <h3>Platform Health</h3>
            <p>Total Revenue: <strong style="color:var(--gold)">$45,200</strong></p>
            <p>Active Drivers: 12</p>
            <p>Fraud Alerts: 0</p>
        </div>
        <button class="btn btn-outline" onclick="App.switchRole('buyer')">Switch to Buyer</button>
    </section>
</main>

<script>
/**
 * MARKA CORE v6.0 - UNIFIED ECOSYSTEM
 * Multi-Role: Admin, Seller, Buyer
 * Multi-Industry: Taxi, Delivery, E-commerce
 */
const App = {
    state: {
        role: 'buyer',
        wallet: 5000.00,
        registeredServices: [],
        activeJobs: [],
        history: []
    },

    init() {
        this.render();
    },

    // 1. ROLE MANAGEMENT
    switchRole(role) {
        this.state.role = role;
        document.getElementById('user-role-display').innerText = role;
        const view = (role === 'buyer') ? 'buyer-home' : (role === 'admin') ? 'admin-panel' : 'seller-dash';
        this.navigate(view);
    },

    navigate(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        this.render();
    },

    // 2. TAXI & ESCROW LOGIC
    orderTaxi(fare) {
        if(this.state.wallet >= fare) {
            this.state.wallet -= fare;
            alert(`$${fare} held in Escrow. Searching for nearest driver...`);
            this.state.activeJobs.push({ type: 'taxi', status: 'pending', fare });
            this.navigate('buyer-home');
        } else {
            alert("Insufficient Funds. Please top up your MARKA wallet.");
        }
    },

    // 3. VENDOR REGISTRATION
    registerService() {
        const type = document.getElementById('reg-type').value;
        const info = document.getElementById('reg-info').value;
        if(!info) return alert("Please provide vehicle/shop details.");

        this.state.registeredServices.push({ type, info });
        alert(`Success! You are now a registered ${type} on MARKA.`);
        this.render();
    },

    // 4. RENDER ENGINE
    render() {
        document.getElementById('v-balance').innerText = `$${this.state.wallet.toLocaleString()}`;
        
        // Render Active Jobs for Vendors
        if(this.state.role === 'seller') {
            const jobBox = document.getElementById('vendor-active-jobs');
            if(this.state.activeJobs.length > 0) {
                jobBox.innerHTML = '<h3>New Booking Requests</h3>' + this.state.activeJobs.map(j => `
                    <div class="card" style="border: 1px solid var(--gold);">
                        <strong>New ${j.type.toUpperCase()} Request</strong>
                        <p>Earnings: $${j.fare * 0.8} (80%)</p>
                        <button class="btn btn-gold" onclick="alert('Trip Started!')">Accept Job</button>
                    </div>
                `).join('');
            }
        }
    }
};

App.init();
</script>

</body>
</html>
